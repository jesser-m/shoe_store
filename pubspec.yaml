name: shoe_store
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # Payment integration
  flutter_stripe: ^11.1.0
  http: ^1.2.2
  url_launcher: ^6.3.0

  # Charts & graphs (admin dashboard)
  fl_chart: ^0.69.0

  # Professional UI & Security
  google_fonts: ^6.2.1

  # Additional dependencies for clean architecture
  image_picker: ^0.8.7+5
  cached_network_image: ^3.3.0
  shimmer: ^2.0.0
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true